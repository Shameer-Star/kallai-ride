  <body>
    <div id="root">
      <!-- Splash Screen Loader -->
      <style>
        #splash-screen {
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          background: linear-gradient(135deg, #FFF7D6 0%, #FFFFFF 100%);
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .splash-spinner-container {
          position: relative;
          display: flex;
          align-items: center;
          justify-content: center;
          margin-bottom: 24px;
        }
        .splash-pulse {
          position: absolute;
          width: 112px;
          height: 112px;
          border-radius: 50%;
          border: 4px solid rgba(255, 204, 0, 0.25);
          animation: splash-ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        .splash-spin {
          position: absolute;
          width: 96px;
          height: 96px;
          border-radius: 50%;
          border: 4px solid transparent;
          border-top-color: #FFCC00;
          border-right-color: #FFCC00;
          animation: splash-rotate 0.8s linear infinite;
        }
        .splash-logo {
          position: relative;
          width: 64px;
          height: 64px;
          border-radius: 16px;
          background: #ffffff;
          border: 2px solid #E5E7EB;
          box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 8px;
          animation: splash-pulse-anim 1.5s ease-in-out infinite;
        }
        .splash-logo img {
          width: 100%;
          height: 100%;
          object-fit: contain;
        }
        .splash-text {
          text-align: center;
        }
        .splash-title {
          font-size: 18px;
          font-weight: 800;
          color: #111827;
          margin: 0 0 4px 0;
          letter-spacing: -0.025em;
        }
        .splash-subtitle {
          font-size: 11px;
          font-weight: 600;
          color: #6B7280;
          margin: 0;
        }
        @keyframes splash-ping {
          0% { transform: scale(0.8); opacity: 1; }
          100% { transform: scale(1.3); opacity: 0; }
        }
        @keyframes splash-rotate {
          100% { transform: rotate(360deg); }
        }
        @keyframes splash-pulse-anim {
          0%, 100% { transform: scale(1); }
          50% { transform: scale(1.05); }
        }
      </style>
      <div id="splash-screen">
        <div class="splash-spinner-container">
          <div class="splash-pulse"></div>
          <div class="splash-spin"></div>
          <div class="splash-logo">
            <img src="/logo.png" alt="Kallai Rapido" />
          </div>
        </div>
        <div class="splash-text">
          <h2 class="splash-title">Kallai Rapido</h2>
          <p class="splash-subtitle">வண்டி தயார் செய்யப்படுகிறது...</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
